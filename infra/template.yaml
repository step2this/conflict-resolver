AWSTemplateFormatVersion: '2010-09-09'
Description: Conflict Resolver pipeline scheduler — Lambda + EventBridge + alarms

Parameters:
  InstanceId:
    Type: String
    Description: EC2 instance ID to run the pipeline on
    AllowedPattern: 'i-[a-f0-9]+'
  NotificationEmail:
    Type: String
    Default: ''
    Description: Email address for failure notifications (leave empty to skip)

Conditions:
  HasNotificationEmail: !Not [!Equals [!Ref NotificationEmail, '']]

Resources:

  # --- IAM ---

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: conflict-resolver-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: conflict-resolver-pipeline-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # EC2: start/stop scoped to our instance
              - Effect: Allow
                Action:
                  - ec2:StartInstances
                  - ec2:StopInstances
                Resource: !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${InstanceId}'
              # EC2: describe needs wildcard resource
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: '*'
              # SSM: send command scoped to instance + RunShellScript document
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${InstanceId}'
                  - !Sub 'arn:aws:ssm:${AWS::Region}::document/AWS-RunShellScript'
              - Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                  - ssm:DescribeInstanceInformation
                Resource: '*'
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'
              # SNS: publish to our topic (conditional — always allowed, topic may not exist)
              - !If
                - HasNotificationEmail
                - Effect: Allow
                  Action:
                    - sns:Publish
                  Resource: !Ref PipelineAlertsTopic
                - !Ref 'AWS::NoValue'

  SchedulerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: conflict-resolver-scheduler-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-lambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt PipelineSchedulerFunction.Arn

  # --- Lambda ---

  PipelineSchedulerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: conflict-resolver-pipeline
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Timeout: 900
      ReservedConcurrentExecutions: 1
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: conflict-digest
        S3Key: lambda/pipeline-scheduler.zip
      Environment:
        Variables:
          INSTANCE_ID: !Ref InstanceId
          SNS_TOPIC_ARN: !If
            - HasNotificationEmail
            - !Ref PipelineAlertsTopic
            - ''

  # --- EventBridge Scheduler ---

  MorningSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: conflict-resolver-morning
      ScheduleExpression: 'cron(0 6 * * ? *)'
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !GetAtt PipelineSchedulerFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn
        RetryPolicy:
          MaximumRetryAttempts: 1

  EveningSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: conflict-resolver-evening
      ScheduleExpression: 'cron(0 18 * * ? *)'
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !GetAtt PipelineSchedulerFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn
        RetryPolicy:
          MaximumRetryAttempts: 1

  # --- SNS ---

  PipelineAlertsTopic:
    Type: AWS::SNS::Topic
    Condition: HasNotificationEmail
    Properties:
      TopicName: conflict-resolver-alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref NotificationEmail

  # --- CloudWatch Alarms ---

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: conflict-resolver-lambda-errors
      AlarmDescription: Fires when the pipeline Lambda function errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref PipelineSchedulerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If
          - HasNotificationEmail
          - !Ref PipelineAlertsTopic
          - !Ref 'AWS::NoValue'

  InstanceRunningAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: conflict-resolver-instance-orphaned
      AlarmDescription: Fires if EC2 instance runs for more than 30 minutes (catches orphaned instances)
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: InstanceId
          Value: !Ref InstanceId
      Statistic: Average
      Period: 1800
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If
          - HasNotificationEmail
          - !Ref PipelineAlertsTopic
          - !Ref 'AWS::NoValue'

Outputs:
  FunctionArn:
    Value: !GetAtt PipelineSchedulerFunction.Arn
  FunctionName:
    Value: !Ref PipelineSchedulerFunction
  MorningScheduleArn:
    Value: !GetAtt MorningSchedule.Arn
  EveningScheduleArn:
    Value: !GetAtt EveningSchedule.Arn
