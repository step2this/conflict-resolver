  - name: WarMonitor
    channel: war_monitor
    bias: aggregator
    type: osint

  - name: Islamic Resistance Iraq
    channel: islamic_resistance_in_iraq
    bias: pro-resistance
    type: primary-actor

  - name: Ansarallah (Houthi)
    channel: ansarallah_en
